name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --no-fail-fast

  postgres:
    name: Postgres conformance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TASKQ_PG_TEST_URL_BASE: "host=localhost port=5432 user=postgres password=postgres dbname=postgres"
      TASKQ_PG_TEST_URL: "host=localhost port=5432 user=postgres password=postgres dbname=taskq_test_phase3"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run Postgres backend tests (smoke + conformance)
        run: cargo test -p taskq-storage-postgres --no-fail-fast -- --include-ignored

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --workspace --release

  e2e:
    name: E2E (docker compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Build the cp + cli release binaries first; the Dockerfile
      # invokes `cargo build --release -p taskq-cp -p taskq-cli`
      # itself, but doing it here primes the rust-cache so subsequent
      # CI runs are fast. The image build still re-builds inside the
      # container (Linux glibc != possibly-different host).
      - name: Prebuild release binaries
        run: cargo build --release -p taskq-cp -p taskq-cli

      - name: Build CP docker image
        run: docker build -f docker/Dockerfile.cp -t taskq-rs/cp:e2e .

      # Run sequentially -- each test owns its compose project but
      # they share the docker daemon and would race for free ports
      # otherwise.
      - name: Run E2E tests
        run: cargo test -p taskq-e2e-tests --no-fail-fast -- --include-ignored --test-threads=1
