name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands. Avoids
# wasting compute on stale commits during rapid `--force` cycles.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --no-fail-fast

  postgres:
    name: Postgres conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TASKQ_PG_TEST_URL_BASE: "host=localhost port=5432 user=postgres password=postgres dbname=postgres"
      TASKQ_PG_TEST_URL: "host=localhost port=5432 user=postgres password=postgres dbname=taskq_test_phase3"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # smoke.rs uses `ALTER DATABASE ... SET search_path` for
      # schema isolation, which races on `pg_db_role_setting`'s
      # unique constraint when two tests run in parallel. admin.rs
      # uses per-connection `options=-c search_path=...` instead.
      # Until smoke.rs is migrated to that pattern, serialize this
      # job's tests.
      - name: Run Postgres backend tests (smoke + conformance + admin)
        run: cargo test -p taskq-storage-postgres --no-fail-fast -- --include-ignored --test-threads=1

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --workspace --release

  e2e:
    name: E2E (docker compose)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Prebuild release binaries
        run: cargo build --release -p taskq-cp -p taskq-cli

      - name: Build CP docker image
        run: docker build -f docker/Dockerfile.cp -t taskq-rs/cp:e2e .

      - name: Run E2E tests
        run: cargo test -p taskq-e2e-tests --no-fail-fast -- --include-ignored --test-threads=1

  doc:
    name: Doc build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Build all rustdoc to catch syntax errors and missing items.
      # Strict intra-doc-link checking is NOT enforced here — the
      # current source has ~20 pre-existing broken-link / public-to-
      # private warnings that are out of scope for this CI setup.
      # Tracked separately; flip to `-D rustdoc::broken-intra-doc-links`
      # once those land.
      - name: cargo doc
        run: cargo doc --workspace --no-deps --document-private-items

  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      # rustsec/audit-check requires Cargo.lock. The workspace
      # gitignores Cargo.lock (library-style; binaries are taskq-cp /
      # taskq-cli only). Generate one on the fly so the action can
      # walk the dep graph.
      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      # New advisories fail this job loudly. The ignore list mirrors
      # `audit.toml` at the workspace root (the action doesn't auto-
      # read that file, but `audit.toml` carries the rationale for
      # humans). Keep both in sync if either changes.
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2024-0437

  typos:
    name: Typos
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: crate-ci/typos@v1.27.0
