repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Spell-check across source, docs, and comments. Mirrors the `typos`
  # CI job so contributors catch issues before pushing.
  - repo: https://github.com/crate-ci/typos
    rev: v1.27.0
    hooks:
      - id: typos

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test-compile
        name: cargo test --no-run
        entry: cargo test --workspace --no-run
        language: system
        types: [rust]
        pass_filenames: false
