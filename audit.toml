# cargo-audit / rustsec audit-check config.
#
# See https://github.com/rustsec/rustsec/blob/main/cargo-audit/audit.toml.example
# for the full schema.

[advisories]
ignore = [
    # RUSTSEC-2024-0437 -- protobuf 2.28.0 (transitive via
    # opentelemetry-prometheus 0.17.0): "Crash due to uncontrolled
    # recursion in protobuf crate". Fixed in protobuf >= 3.7.2.
    #
    # Why we ignore: the CVE is a DoS via *parsing* untrusted
    # protobuf input. Our control plane only ever ENCODES protobuf
    # (Prometheus text scrape format via opentelemetry-prometheus's
    # registry). All client wire input lands as FlatBuffers via
    # pure-grpc-rs; we never feed bytes to `protobuf::Message::parse`
    # from an untrusted source.
    #
    # Bumping past this would require opentelemetry-prometheus
    # 0.17.0 -> 0.31.0, which forces an opentelemetry-stack jump
    # from 0.24 to 0.30+ (breaking change across observability).
    # Tracked separately for the next OTel-stack upgrade window.
    "RUSTSEC-2024-0437",
]
